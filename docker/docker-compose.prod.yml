name: cloud-policy-crypto-access
services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: wanthinnn/crypto-access:latest
    container_name: crypto-web
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/db.sqlite3}
      - PYTHONUNBUFFERED=1
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - REDIS_URL=redis://crypto-redis:6379/1
      - VAULT_ADDR=${VAULT_ADDR:-http://vault:8200}
      - VAULT_TOKEN=${VAULT_TOKEN:-root}
      - VAULT_SECRET_PATH=${VAULT_SECRET_PATH:-secret/data/crypto_access}
    depends_on:
      - crypto-redis
      - vault
    volumes:
      - ${DB_DIR:-sqlite_volume}:/app/data
      - ${KEYS_DIR:-keys_volume}:/app/config/keys
      - ./docs:/docs
      - static_volume:/app/staticfiles
      - ./scripts/gunicorn.conf.py:/app/gunicorn.conf.py:ro
      - ./scripts/init_data.py:/app/init_data.py:ro
      - ./scripts/vault_manager.py:/app/vault_manager.py:ro
      - ./src/crypto_access/migrations:/app/crypto_access/migrations
    tmpfs:
      - /tmp
    expose:
      - "8000"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  crypto-redis:
    image: redis:7-alpine
    container_name: crypto-redis
    expose:
      - "6379"
    networks:
      - app-network
    restart: unless-stopped

  vault:
    image: hashicorp/vault:1.13
    container_name: vault_server
    environment:
      - VAULT_ADDR=http://127.0.0.1:8200
      - VAULT_API_ADDR=http://127.0.0.1:8200
      - VAULT_LOCAL_CONFIG={"storage":{"file":{"path":"/vault/file"}},"listener":{"tcp":{"address":"0.0.0.0:8200","tls_disable":1}},"default_lease_ttl":"168h","max_lease_ttl":"720h","ui":true}
    volumes:
      - vault_data:/vault/file
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - app-network
    command: server
    restart: unless-stopped

  nginx:
    build: ./nginx
    container_name: crypto-nginx
    profiles:
      - ssl
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - static_volume:/app/staticfiles:ro
      - ./config/certs:/opt/nginx/certs:ro
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-cloudsafe.cyberfortress.local}
      - SSL_CERT_FILE=${SSL_CERT_FILE:-_.cyberfortress.local.crt}
      - SSL_KEY_FILE=${SSL_KEY_FILE:-_.cyberfortress.local.key}
      - SSL_CA_FILE=${SSL_CA_FILE:-CyberFortress-RootCA.crt}
    depends_on:
      - web
    networks:
      - app-network
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared_tunnel
    command: tunnel --config /etc/cloudflared/config.yml run ${CLOUDFLARE_TUNNEL_ID}
    env_file:
      - .env
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      - web
    networks:
      - app-network
    restart: unless-stopped
    profiles:
      - tunnel

volumes:
  sqlite_volume:
    name: sqlite_volume
  static_volume:
    name: static_volume
  keys_volume:
    name: keys_volume
  vault_data:
    name: vault_data

networks:
  app-network:
    driver: bridge
