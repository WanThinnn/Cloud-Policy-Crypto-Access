name: cloud-policy-crypto-access
services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: django_app
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py init_settings &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application -c gunicorn.conf.py"
    volumes:
      - ./src:/app
      - /app/lib # Thêm dòng này để Docker sử dụng file .so bên trong image thay vì đọc từ Windows sang
      - ./docs:/docs
      - ./scripts/gunicorn.conf.py:/app/gunicorn.conf.py:ro
      - static_volume:/app/staticfiles
      - ${DB_DIR:-sqlite_volume}:/app/data
      - ${KEYS_DIR:-keys_volume}:/app/config/keys
      - ./scripts/init_data.py:/app/init_data.py:ro
      - ./scripts/vault_manager.py:/app/vault_manager.py:ro
      - ./src/crypto_access/migrations:/app/crypto_access/migrations
    tmpfs:
      - /tmp

    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/db.sqlite3}
      - PYTHONUNBUFFERED=1
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - REDIS_URL=redis://redis_cache:6379/1
      - VAULT_ADDR=${VAULT_ADDR:-http://vault:8200}
      - VAULT_TOKEN=${VAULT_TOKEN:-root}
      - VAULT_SECRET_PATH=${VAULT_SECRET_PATH:-secret/data/crypto_access}
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
    depends_on:
      - nginx
      - redis_cache
      - vault
      - clamav
      # - db  # Uncomment if using postgres
    networks:
      - app-network
    restart: unless-stopped

  # Optional PostgreSQL Database
  # db:
  #   image: postgres:15-alpine
  #   container_name: postgres_db
  #   environment:
  #     - POSTGRES_USER=crypto_user
  #     - POSTGRES_PASSWORD=crypto_pass
  #     - POSTGRES_DB=crypto_db
  #   volumes:
  #     - postgres_volume:/var/lib/postgresql/data
  #   networks:
  #     - app-network
  #   restart: unless-stopped

  vault:
    image: hashicorp/vault:latest
    container_name: vault_server
    ports:
      - "8200:8200"
    command: server
    environment:
      - VAULT_API_ADDR=http://127.0.0.1:8200
    volumes:
      - ./docker/vault/config.hcl:/vault/config/config.hcl:ro
      - vault_data:/vault/file
    cap_add:
      - IPC_LOCK
    networks:
      - app-network
    restart: unless-stopped

  redis_cache:
    image: redis:7-alpine
    container_name: redis_cache
    expose:
      - "6379"
    networks:
      - app-network
    restart: unless-stopped

  clamav:
    image: clamav/clamav:latest
    container_name: clamav_scanner
    expose:
      - "3310"
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx_server
    profiles:
      - ssl
    volumes:
      - static_volume:/app/staticfiles
      - ./config/certs:/opt/nginx/certs:ro
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-cloudsafe.cyberfortress.local}
      - SSL_CERT_FILE=${SSL_CERT_FILE:-_.cyberfortress.local.crt}
      - SSL_KEY_FILE=${SSL_KEY_FILE:-_.cyberfortress.local.key}
      - SSL_CA_FILE=${SSL_CA_FILE:-CyberFortress-RootCA.crt}
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    networks:
      - app-network
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared_tunnel
    command: tunnel --config /etc/cloudflared/config.yml run ${CLOUDFLARE_TUNNEL_ID}
    env_file:
      - .env
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      - web
    networks:
      - app-network
    restart: unless-stopped
    profiles:
      - tunnel

volumes:
  static_volume:
  sqlite_volume:
  keys_volume:
  vault_data:

networks:
  app-network:
    driver: bridge
