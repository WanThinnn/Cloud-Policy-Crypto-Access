{% extends "base.html" %}

{% block title %}Register - Cloud Firestore Crypto Access{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/detail.css') }}">
<style>
.register-container {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-xl);
}

.register-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--border-radius);
    padding: var(--space-3xl);
    backdrop-filter: blur(20px);
    width: 100%;
    max-width: 500px;
    box-shadow: var(--shadow-lg);
}

.register-header {
    text-align: center;
    margin-bottom: var(--space-3xl);
}

.register-title {
    font-size: var(--font-size-2xl);
    font-weight: var(--font-weight-bold);
    color: var(--text-primary);
    margin-bottom: var(--space-sm);
}

.register-subtitle {
    color: var(--text-secondary);
    font-size: var(--font-size-md);
}

.form-group {
    margin-bottom: var(--space-lg);
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--space-md);
}

.form-label {
    display: block;
    margin-bottom: var(--space-sm);
    color: var(--text-primary);
    font-weight: var(--font-weight-medium);
}

.form-input {
    width: 100%;
    padding: var(--space-md);
    border: 1px solid var(--card-border);
    border-radius: var(--border-radius-small);
    background: var(--card-bg);
    color: var(--text-primary);
    font-family: inherit;
    font-size: var(--font-size-md);
    transition: var(--transition);
}

.form-input:focus {
    outline: none;
    border-color: var(--text-accent);
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.password-strength {
    margin-top: var(--space-sm);
    padding: var(--space-sm);
    border-radius: var(--border-radius-small);
    font-size: var(--font-size-sm);
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--card-border);
}

.strength-bar {
    height: 4px;
    border-radius: 2px;
    margin-top: var(--space-sm);
    transition: var(--transition);
}

.strength-weak {
    background: var(--color-error);
    width: 25%;
}

.strength-fair {
    background: orange;
    width: 50%;
}

.strength-good {
    background: var(--color-warning);
    width: 75%;
}

.strength-strong {
    background: var(--color-success);
    width: 100%;
}

.form-checkbox {
    display: flex;
    align-items: flex-start;
    margin-bottom: var(--space-lg);
}

.form-checkbox input {
    margin-right: var(--space-sm);
    margin-top: 2px;
}

.form-checkbox label {
    color: var(--text-secondary);
    font-size: var(--font-size-sm);
    line-height: 1.4;
}

.form-checkbox a {
    color: var(--text-accent);
    text-decoration: none;
}

.form-checkbox a:hover {
    text-decoration: underline;
}

.register-button {
    width: 100%;
    padding: var(--space-md);
    background: var(--gradient-primary);
    color: white;
    border: none;
    border-radius: var(--border-radius-small);
    font-size: var(--font-size-md);
    font-weight: var(--font-weight-medium);
    cursor: pointer;
    transition: var(--transition);
    margin-bottom: var(--space-lg);
}

.register-button:hover {
    opacity: 0.9;
    transform: translateY(-1px);
}

.register-button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}

.register-divider {
    text-align: center;
    margin: var(--space-lg) 0;
    position: relative;
    color: var(--text-secondary);
}

.register-divider::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--card-border);
}

.register-divider span {
    background: var(--card-bg);
    padding: 0 var(--space-md);
}

.register-links {
    text-align: center;
}

.register-link {
    color: var(--text-accent);
    text-decoration: none;
    font-size: var(--font-size-sm);
}

.register-link:hover {
    text-decoration: underline;
}

.loading-spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    border-top-color: white;
    animation: spin 1s linear infinite;
    margin-right: var(--space-sm);
}

@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}

.error-message {
    background: rgba(220, 38, 127, 0.1);
    border: 1px solid rgba(220, 38, 127, 0.3);
    border-radius: var(--border-radius-small);
    padding: var(--space-md);
    margin-bottom: var(--space-lg);
    color: var(--color-error);
    font-size: var(--font-size-sm);
}

.success-message {
    background: rgba(34, 197, 94, 0.1);
    border: 1px solid rgba(34, 197, 94, 0.3);
    border-radius: var(--border-radius-small);
    padding: var(--space-md);
    margin-bottom: var(--space-lg);
    color: var(--color-success);
    font-size: var(--font-size-sm);
}
</style>
{% endblock %}

{% block content %}
<div class="register-container">
    <div class="register-card">
        <div class="register-header">
            <h1 class="register-title">🚀 Create Account</h1>
            <p class="register-subtitle">Join our secure cloud storage platform</p>
        </div>

        <!-- Error/Success Messages -->
        <div id="messageContainer"></div>

        <!-- Register Form -->
        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="firstName">First Name</label>
                    <input 
                        type="text" 
                        class="form-input" 
                        id="firstName" 
                        name="first_name" 
                        required
                        placeholder="Enter first name"
                    >
                </div>
                <div class="form-group">
                    <label class="form-label" for="lastName">Last Name</label>
                    <input 
                        type="text" 
                        class="form-input" 
                        id="lastName" 
                        name="last_name" 
                        required
                        placeholder="Enter last name"
                    >
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input 
                    type="email" 
                    class="form-input" 
                    id="email" 
                    name="email" 
                    required
                    placeholder="Enter your email"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input 
                    type="text" 
                    class="form-input" 
                    id="username" 
                    name="username" 
                    required
                    placeholder="Choose a username"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input 
                    type="password" 
                    class="form-input" 
                    id="password" 
                    name="password" 
                    required
                    placeholder="Enter password"
                >
                <div class="password-strength" id="passwordStrength" style="display: none;">
                    <div class="strength-text"></div>
                    <div class="strength-bar"></div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword">Confirm Password</label>
                <input 
                    type="password" 
                    class="form-input" 
                    id="confirmPassword" 
                    name="confirm_password" 
                    required
                    placeholder="Confirm password"
                >
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="department">Department</label>
                    <select class="form-input" id="department" name="department" required>
                        <option value="">Select department</option>
                        <option value="HR">Human Resources</option>
                        <option value="IT">Information Technology</option>
                        <option value="Finance">Finance</option>
                        <option value="Sales">Sales</option>
                        <option value="Marketing">Marketing</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="role">Role</label>
                    <select class="form-input" id="role" name="role" required>
                        <option value="">Select role</option>
                        <option value="Employee">Employee</option>
                        <option value="Manager">Manager</option>
                        <option value="Director">Director</option>
                    </select>
                </div>
            </div>

            <div class="form-checkbox">
                <input type="checkbox" id="agreeTerms" name="agree_terms" required>
                <label for="agreeTerms">
                    I agree to the <a href="/terms" target="_blank">Terms of Service</a> 
                    and <a href="/privacy" target="_blank">Privacy Policy</a>
                </label>
            </div>

            <div class="form-checkbox">
                <input type="checkbox" id="agreeNewsletter" name="newsletter">
                <label for="agreeNewsletter">
                    Send me updates about new features and security announcements
                </label>
            </div>

            <button type="submit" class="register-button" id="registerButton">
                <span id="buttonText">Create Account</span>
            </button>
        </form>

        <div class="register-divider">
            <span>or</span>
        </div>

        <div class="register-links">
            <a href="/login" class="register-link">Already have an account? Sign in</a>
        </div>
    </div>
</div>

<script>
class RegisterManager {
    constructor() {
        this.form = document.getElementById('registerForm');
        this.button = document.getElementById('registerButton');
        this.buttonText = document.getElementById('buttonText');
        this.messageContainer = document.getElementById('messageContainer');
        this.passwordField = document.getElementById('password');
        this.confirmPasswordField = document.getElementById('confirmPassword');
        this.init();
    }

    init() {
        this.form.addEventListener('submit', (e) => this.handleRegister(e));
        this.passwordField.addEventListener('input', () => this.checkPasswordStrength());
        this.confirmPasswordField.addEventListener('input', () => this.checkPasswordMatch());
    }

    checkPasswordStrength() {
        const password = this.passwordField.value;
        const strengthContainer = document.getElementById('passwordStrength');
        const strengthText = strengthContainer.querySelector('.strength-text');
        const strengthBar = strengthContainer.querySelector('.strength-bar');

        if (password.length === 0) {
            strengthContainer.style.display = 'none';
            return;
        }

        strengthContainer.style.display = 'block';

        let strength = 0;
        let feedback = [];

        // Length check
        if (password.length >= 8) strength++;
        else feedback.push('at least 8 characters');

        // Uppercase check
        if (/[A-Z]/.test(password)) strength++;
        else feedback.push('uppercase letter');

        // Lowercase check
        if (/[a-z]/.test(password)) strength++;
        else feedback.push('lowercase letter');

        // Number check
        if (/\d/.test(password)) strength++;
        else feedback.push('number');

        // Special character check
        if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength++;
        else feedback.push('special character');

        const levels = ['weak', 'fair', 'good', 'strong'];
        const level = Math.min(Math.floor(strength / 1.25), 3);
        
        strengthBar.className = `strength-bar strength-${levels[level]}`;
        
        if (feedback.length === 0) {
            strengthText.textContent = 'Strong password!';
        } else {
            strengthText.textContent = `Add: ${feedback.join(', ')}`;
        }
    }

    checkPasswordMatch() {
        const password = this.passwordField.value;
        const confirmPassword = this.confirmPasswordField.value;
        
        if (confirmPassword.length > 0 && password !== confirmPassword) {
            this.confirmPasswordField.style.borderColor = 'var(--color-error)';
        } else {
            this.confirmPasswordField.style.borderColor = 'var(--card-border)';
        }
    }

    async handleRegister(e) {
        e.preventDefault();
        
        const formData = new FormData(this.form);
        const data = Object.fromEntries(formData.entries());

        // Clear previous messages
        this.clearMessages();

        // Validate form
        if (!this.validateForm(data)) {
            return;
        }

        // Show loading state
        this.setLoading(true);

        try {
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (response.ok) {
                this.showMessage('Account created successfully! Please check your email to verify your account.', 'success');
                
                // Redirect to login after delay
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            } else {
                this.showMessage(result.error || 'Registration failed. Please try again.', 'error');
            }
        } catch (error) {
            console.error('Registration error:', error);
            this.showMessage('Network error. Please check your connection and try again.', 'error');
        } finally {
            this.setLoading(false);
        }
    }

    validateForm(data) {
        if (!data.first_name || !data.last_name) {
            this.showMessage('Please enter your full name.', 'error');
            return false;
        }

        if (!data.email || !data.email.includes('@')) {
            this.showMessage('Please enter a valid email address.', 'error');
            return false;
        }

        if (!data.username || data.username.length < 3) {
            this.showMessage('Username must be at least 3 characters long.', 'error');
            return false;
        }

        if (!data.password || data.password.length < 8) {
            this.showMessage('Password must be at least 8 characters long.', 'error');
            return false;
        }

        if (data.password !== data.confirm_password) {
            this.showMessage('Passwords do not match.', 'error');
            return false;
        }

        if (!data.department || !data.role) {
            this.showMessage('Please select your department and role.', 'error');
            return false;
        }

        if (!data.agree_terms) {
            this.showMessage('You must agree to the terms and conditions.', 'error');
            return false;
        }

        return true;
    }

    setLoading(loading) {
        if (loading) {
            this.button.disabled = true;
            this.buttonText.innerHTML = '<span class="loading-spinner"></span>Creating account...';
        } else {
            this.button.disabled = false;
            this.buttonText.innerHTML = 'Create Account';
        }
    }

    showMessage(message, type) {
        const messageClass = type === 'error' ? 'error-message' : 'success-message';
        this.messageContainer.innerHTML = `
            <div class="${messageClass}">
                ${message}
            </div>
        `;
    }

    clearMessages() {
        this.messageContainer.innerHTML = '';
    }
}

// Initialize register manager when page loads
document.addEventListener('DOMContentLoaded', () => {
    new RegisterManager();
});

// Handle theme on register page
document.addEventListener('DOMContentLoaded', () => {
    // Apply saved theme
    const savedTheme = localStorage.getItem('theme') || 'auto';
    document.body.setAttribute('data-theme', savedTheme);
    
    // Apply system theme if auto
    if (savedTheme === 'auto') {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.body.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
    }
});
</script>
{% endblock %}
