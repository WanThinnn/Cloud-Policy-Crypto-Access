version: '3.8'

services:
  # Main Backend Service
  crypto-access-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto-access-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./env/.env
    environment:
      - FLASK_ENV=production
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
      - HOST=0.0.0.0
      - PORT=5000
    volumes:
      # Persistent storage for logs
      - ./log:/app/log
      # Persistent storage for uploads
      - ./uploads:/app/uploads
      # Persistent storage for temporary files
      - ./tmp:/app/tmp
      # Firebase credentials
      - ./env:/app/env:ro
      # ABE keys (if pre-generated)
      - ./abe_keys:/app/abe_keys
    networks:
      - crypto-access-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/ca/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  crypto-access-network:
    driver: bridge
