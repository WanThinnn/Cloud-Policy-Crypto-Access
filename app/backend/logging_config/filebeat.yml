# Filebeat configuration for Cloud Firestore Crypto Access
# This configuration is designed for ELK Stack integration

# Global settings
name: "cloud-cloud-firestore-crypto-access-backend"
tags: ["crypto-access", "flask", "cp-abe", "backend"]

# Filebeat inputs
filebeat.inputs:
  # Application logs
  - type: log
    enabled: true
    paths:
      - "D:/Documents/UIT/Nam_4/Cloud-Firestore-Crypto-Access/app/backend/log/app.log"
    fields:
      log_type: "application"
      service: "cloud-firestore-crypto-access-backend"
      component: "main"
    fields_under_root: true
    multiline.pattern: '^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},'
    multiline.negate: true
    multiline.match: after

  # Authentication logs
  - type: log
    enabled: true
    paths:
      - "D:/Documents/UIT/Nam_4/Cloud-Firestore-Crypto-Access/app/backend/log/auth.log"
    fields:
      log_type: "authentication"
      service: "cloud-firestore-crypto-access-backend"
      component: "auth"
      security_category: "access_control"
    fields_under_root: true

  # JSON logs for structured parsing
  - type: log
    enabled: true
    paths:
      - "D:/Documents/UIT/Nam_4/Cloud-Firestore-Crypto-Access/app/backend/log/*_json.log"
    json.keys_under_root: true
    json.overwrite_keys: true
    json.message_key: message

# Output configuration
output.file:
  path: "D:/Documents/UIT/Nam_4/Cloud-Firestore-Crypto-Access/app/backend/log"
  filename: filebeat-output
  rotate_every_kb: 10000
  number_of_files: 5
  permissions: 0644

# Logging configuration
logging.level: info
logging.to_files: true
logging.files:
  path: "D:/Documents/UIT/Nam_4/Cloud-Firestore-Crypto-Access/app/backend/log"
  name: filebeat
  keepfiles: 7
  permissions: 0644
