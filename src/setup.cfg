[flake8]
max-line-length = 120
exclude = 
    .git,
    __pycache__,
    */migrations/*,
    */venv/*,
    */env/*,
    .venv,
    */staticfiles/*,
    */media/*
ignore = E203, E266, W503
max-complexity = 10

[isort]
profile = black
line_length = 120
skip = migrations, venv, env, .venv

[tool:black]
line-length = 120
target-version = ['py38', 'py39', 'py310', 'py311']
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | env
  | migrations
  | staticfiles
  | media
)/
'''
