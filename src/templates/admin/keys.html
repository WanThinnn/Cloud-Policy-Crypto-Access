{% extends "base.html" %}

{% block title %}Key Revocations - Admin{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Key Revocation List (KRL)</h1>
            <p class="mt-1 text-sm text-gray-600 dark:text-gray-400">View history of revoked and reissued CP-ABE keys.</p>
        </div>
        <div class="flex flex-wrap items-center gap-3">
            <div class="flex items-center gap-2">
                <label for="start_date" class="text-sm font-medium text-gray-700 dark:text-gray-300">From:</label>
                <input type="date" id="start_date" class="rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm dark:bg-gray-700 dark:border-gray-600 dark:text-white px-2 py-1.5">
            </div>
            <div class="flex items-center gap-2">
                <label for="end_date" class="text-sm font-medium text-gray-700 dark:text-gray-300">To:</label>
                <input type="date" id="end_date" class="rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm dark:bg-gray-700 dark:border-gray-600 dark:text-white px-2 py-1.5">
            </div>
            <button id="refresh-btn" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-md flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                Filter & Refresh
            </button>
        </div>
    </div>

    <!-- Alert -->
    <div id="alert" class="hidden rounded-md p-4"></div>

    <!-- Keys Table -->
    <div class="bg-white dark:bg-gray-800 shadow rounded-lg overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
            <thead class="bg-gray-50 dark:bg-gray-900">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Revocation ID</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">User</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Key ID (Ver)</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Reason</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Revoked At</th>
                </tr>
            </thead>
            <tbody id="keys-list" class="bg-white dark:bg-gray-800 divide-y divide-gray-200 dark:divide-gray-700">
                <tr><td colspan="6" class="px-6 py-4 text-center text-gray-500">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    loadKeys();
    
    document.getElementById('refresh-btn').addEventListener('click', loadKeys);
});

async function loadKeys() {
    const tbody = document.getElementById('keys-list');
    tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-4 text-center text-gray-500">Loading...</td></tr>';
    
    try {
        const startDate = document.getElementById('start_date').value;
        const endDate = document.getElementById('end_date').value;
        
        let url = '/api/admin/key-revocations/';
        const params = new URLSearchParams();
        if (startDate) params.append('start_date', startDate);
        if (endDate) params.append('end_date', endDate);
        
        if (params.toString()) {
            url += '?' + params.toString();
        }
        
        const response = await fetch(url);
        if (!response.ok) throw new Error('Failed to fetch keys');
        const data = await response.json();
        
        const keys = Array.isArray(data) ? data : data.results;
        
        tbody.innerHTML = '';
        if (!keys || keys.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-4 text-center text-gray-500">No key revocations found</td></tr>';
            return;
        }
        
        keys.forEach(key => {
            const statusColors = {
                'revoked': 'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-400 border border-red-200 dark:border-red-800',
                'reissued': 'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400 border border-green-200 dark:border-green-800',
                'pending': 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-400 border border-yellow-200 dark:border-yellow-800',
                'cancelled': 'bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-300 border border-gray-200 dark:border-gray-600'
            };
            
            const colorClass = statusColors[key.status] || statusColors['pending'];
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900 dark:text-white">
                    ${key.revocation_id}
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">
                    <div class="font-medium text-gray-900 dark:text-white">${key.user ? key.user.username : 'Unknown'}</div>
                    <div class="text-xs">${key.user ? key.user.email : ''}</div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">
                    <code class="px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded text-xs">${key.key_id}</code>
                    <span class="text-xs ml-1">(v${key.key_version})</span>
                </td>
                <td class="px-6 py-4 text-sm text-gray-500 dark:text-gray-400">
                    <div class="font-medium text-gray-900 dark:text-white">${key.reason}</div>
                    ${key.old_attributes && Object.keys(key.old_attributes).length > 0 ? `
                    <details class="mt-2 outline-none">
                        <summary class="text-xs text-indigo-500 hover:text-indigo-700 cursor-pointer outline-none">Old Attributes (Decrypted)</summary>
                        <div class="mt-1 bg-gray-50 dark:bg-gray-700/50 p-2 rounded text-xs overflow-x-auto border border-gray-200 dark:border-gray-600">
                            <pre class="text-gray-700 dark:text-gray-300 m-0">${JSON.stringify(key.old_attributes, null, 2)}</pre>
                        </div>
                    </details>` : ''}
                    ${key.new_attributes && Object.keys(key.new_attributes).length > 0 ? `
                    <details class="mt-2 outline-none">
                        <summary class="text-xs text-indigo-500 hover:text-indigo-700 cursor-pointer outline-none">New Attributes (Decrypted)</summary>
                        <div class="mt-1 bg-gray-50 dark:bg-gray-700/50 p-2 rounded text-xs overflow-x-auto border border-gray-200 dark:border-gray-600">
                            <pre class="text-gray-700 dark:text-gray-300 m-0">${JSON.stringify(key.new_attributes, null, 2)}</pre>
                        </div>
                    </details>` : ''}
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <span class="px-2.5 py-0.5 inline-flex text-xs leading-5 font-medium rounded-full ${colorClass}">
                        ${key.status.toUpperCase()}
                    </span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">
                    ${new Date(key.revoked_at).toLocaleString()}
                </td>
            `;
            tbody.appendChild(tr);
        });
    } catch (error) {
        console.error('Error:', error);
        tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-4 text-center text-red-500">Error loading data: ${error.message}</td></tr>`;
    }
}
</script>
{% endblock %}
