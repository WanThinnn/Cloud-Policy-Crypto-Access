<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Crypto Access{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    {% load static tailwind_tags %}
    {% tailwind_css %}
    
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-slate-800 shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <a href="{% url 'crypto_access:index' %}" class="text-white text-2xl font-bold hover:text-blue-400 transition duration-200">
                    🔐 Crypto Access
                </a>
                <ul class="flex space-x-8">
                    <li>
                        <a href="{% url 'crypto_access:index' %}" class="text-white hover:text-blue-400 transition duration-200">Home</a>
                    </li>
                    <li>
                        <a href="/admin/" class="text-white hover:text-blue-400 transition duration-200">Admin</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-slate-800 text-white mt-auto">
        <div class="container mx-auto px-4 py-6 text-center">
            <p>&copy; 2026 Crypto Access. All rights reserved.</p>
        </div>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
