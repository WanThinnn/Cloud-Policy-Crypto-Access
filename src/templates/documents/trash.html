{% extends "base.html" %}
{% load static %}
{% block title %}Trash - Trash Management{% endblock %}

{% block content %}
<div class="space-y-6 bg-gradient-to-br from-gray-50 to-red-50 dark:from-gray-900 dark:to-gray-800 min-h-screen p-6">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-6 mb-6">
        <div class="flex flex-col lg:flex-row lg:justify-between lg:items-center gap-6">
            <div>
                <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100 flex items-center gap-3">
                    <div class="p-2 bg-red-100 rounded-lg">
                        <svg class="w-6 h-6 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                    </div>
                    Trash
                </h1>
                <p class="mt-1 text-sm text-gray-500 dark:text-gray-400 dark:text-gray-500 ml-12">Manage soft-deleted documents</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                <button onclick="loadTrash()" class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 dark:bg-gray-800 px-4 py-2 rounded-xl flex items-center gap-2 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    Refresh
                </button>
            </div>
        </div>
    </div>

    <!-- Alert -->
    <div id="alert" class="hidden rounded-xl p-4 relative mb-6 shadow-sm">
        <button onclick="document.getElementById('alert').classList.add('hidden')" class="absolute top-3 right-3 opacity-50 hover:opacity-100 transition-opacity">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        <div class="flex items-center gap-3">
            <span id="alert-icon"></span>
            <span id="alert-message" class="font-medium"></span>
        </div>
    </div>

    <!-- Files Container -->
    <div class="bg-white dark:bg-gray-800 shadow-sm border border-gray-100 dark:border-gray-700 rounded-2xl overflow-hidden min-h-[600px]">
        <div id="trash-list">
            <!-- Header Row -->
            <div class="flex items-center px-6 py-3 bg-gray-50 dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 text-xs font-semibold text-gray-500 dark:text-gray-400 dark:text-gray-500 uppercase tracking-wider">
                <div class="flex-1">Name file</div>
                <div class="w-32">Size</div>
                <div class="w-48">Deletion Time</div>
                <div class="w-48 text-right">Actions</div>
            </div>
            
            <div id="trash-items-container" class="divide-y divide-gray-100 dark:divide-gray-700">
                <!-- Loading State -->
                <div class="flex flex-col items-center justify-center py-20 text-gray-400 dark:text-gray-500">
                    <div class="w-10 h-10 border-4 border-red-200 dark:border-red-800 border-t-red-600 rounded-full animate-spin mb-4"></div>
                    <p class="font-medium">Loading trash data...</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const API_BASE = '/api/storage/';
    const token = localStorage.getItem('access_token');
    
    // Check auth
    if (!token) {
        window.location.href = '/auth/login/?next=/manage/trash/';
    }
    
    // Check permissions
    const perms = JSON.parse(localStorage.getItem('user_permissions') || '{}');
    if (!perms.is_admin) {
        document.getElementById('trash-items-container').innerHTML = `
            <div class="text-center py-20 text-red-500">
                <svg class="mx-auto h-12 w-12 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                <p class="text-lg font-bold">Access Denied</p>
                <p>Only Admin can xem Trash.</p>
            </div>
        `;
    } else {
        loadTrash();
    }
    
    function showAlert(message, type = 'success') {
        const alert = document.getElementById('alert');
        const alertIcon = document.getElementById('alert-icon');
        const alertMessage = document.getElementById('alert-message');
        
        alert.className = 'rounded-xl p-4 relative mb-6 shadow-sm';
        
        if (type === 'success') {
            alert.classList.add('bg-green-50', 'text-green-800', 'border', 'border-green-200');
            alertIcon.innerHTML = '<svg class="w-5 h-5 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>';
        } else if (type === 'error') {
            alert.classList.add('bg-red-50', 'text-red-800', 'border', 'border-red-200');
            alertIcon.innerHTML = '<svg class="w-5 h-5 text-red-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>';
        } else {
            alert.classList.add('bg-blue-50', 'text-blue-800', 'border', 'border-blue-200');
            alertIcon.innerHTML = '<svg class="w-5 h-5 text-blue-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/></svg>';
        }
        
        alertMessage.textContent = message;
        alert.classList.remove('hidden');
        
        if (type === 'success') {
            setTimeout(() => alert.classList.add('hidden'), 5000);
        }
    }
    
    function formatSize(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }
    
    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleString('vi-VN');
    }
    
    async function loadTrash() {
        const container = document.getElementById('trash-items-container');
        container.innerHTML = `
            <div class="flex flex-col items-center justify-center py-20 text-gray-400 dark:text-gray-500">
                <div class="w-10 h-10 border-4 border-red-200 dark:border-red-800 border-t-red-600 rounded-full animate-spin mb-4"></div>
                <p class="font-medium">Loading...</p>
            </div>
        `;
        
        try {
            const response = await fetch('/api/storage/files/trash/', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (!response.ok) throw new Error('Cannot load trash');
            const files = await response.json();
            
            if (files.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 text-gray-500 dark:text-gray-400 dark:text-gray-500">
                        <div class="bg-gray-50 dark:bg-gray-900 p-6 rounded-full inline-block mb-4">
                            <svg class="h-16 w-16 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                        </div>
                        <p class="text-xl font-medium text-gray-600 dark:text-gray-400 dark:text-gray-500">Trash is empty</p>
                    </div>
                `;
                return;
            }
            
            const isSuperAdmin = perms.is_super_admin;
            
            container.innerHTML = files.map(file => `
                <div class="flex items-center px-6 py-4 hover:bg-gray-50 dark:hover:bg-gray-700 dark:bg-gray-800 transition-colors">
                    <div class="flex-1 flex items-center gap-4">
                        <div class="w-10 h-10 flex items-center justify-center bg-gray-100 dark:bg-gray-700/50 rounded-lg text-gray-500 dark:text-gray-400 dark:text-gray-500">
                            <svg class="w-6 h-6 text-gray-400 dark:text-gray-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"/></svg>
                        </div>
                        <div>
                            <p class="font-medium text-gray-900 dark:text-white">${file.file_name}</p>
                            <p class="text-xs text-gray-500 dark:text-gray-400 dark:text-gray-500">Uploader: ${file.uploaded_by_username || 'Unknown'}</p>
                        </div>
                    </div>
                    <div class="w-32 text-sm text-gray-500 dark:text-gray-400 dark:text-gray-500 font-mono">${formatSize(file.file_size)}</div>
                    <div class="w-48 text-sm text-gray-500 dark:text-gray-400 dark:text-gray-500">${formatDate(file.deleted_at)}</div>
                    <div class="w-48 flex justify-end gap-2">
                        <button onclick="restoreFile(${file.id})" class="px-3 py-1.5 text-green-600 dark:text-green-400 hover:text-white border border-green-600 hover:bg-green-600 rounded-md text-sm font-medium transition-colors">
                            Restore
                        </button>
                        ${isSuperAdmin ? `
                        <button onclick="hardDeleteFile(${file.id}, '${file.file_name}')" class="px-3 py-1.5 text-white bg-red-600 hover:bg-red-700 rounded-md text-sm font-medium transition-colors">
                            Delete permanently
                        </button>
                        ` : ''}
                    </div>
                </div>
            `).join('');
            
        } catch (error) {
            showAlert(error.message, 'error');
            container.innerHTML = `<div class="text-center py-10 text-red-500">Error loading data</div>`;
        }
    }
    
    async function restoreFile(id) {
        if (!confirm('Are you sure you want to restore this file?')) return;
        
        try {
            const response = await fetch(`/api/storage/files/${id}/restore/`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (response.ok) {
                showAlert('File restored successfully');
                loadTrash();
            } else {
                const err = await response.json();
                showAlert(err.error || 'Restore error', 'error');
            }
        } catch (error) {
            showAlert('Connection error', 'error');
        }
    }
    
    async function hardDeleteFile(id, name) {
        if (!confirm(`WARNING: File "${name}" will be permanently deleted from Database and Supabase Cloud Storage.\nThis action CANNOT BE UNDONE!\nAre you sure?`)) return;
        
        try {
            const response = await fetch(`/api/storage/files/${id}/hard_delete/`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (response.ok) {
                showAlert('File permanently deleted');
                loadTrash();
            } else {
                const err = await response.json();
                showAlert(err.error || 'Error deleting file', 'error');
            }
        } catch (error) {
            showAlert('Connection error', 'error');
        }
    }
</script>
{% endblock %}
