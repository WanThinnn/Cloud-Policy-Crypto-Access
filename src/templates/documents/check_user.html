<!DOCTYPE html>
<html>
<head>
    <title>Check Current User</title>
</head>
<body>
    <h1>Current User Info</h1>
    <pre id="user-info">Loading...</pre>
    
    <script>
        const accessToken = localStorage.getItem('access_token');
        
        if (!accessToken) {
            document.getElementById('user-info').textContent = 'No token found - Not logged in';
        } else {
            // Decode JWT token
            const payload = JSON.parse(atob(accessToken.split('.')[1]));
            document.getElementById('user-info').textContent = JSON.stringify(payload, null, 2);
            
            // Also fetch user info from API
            fetch('http://127.0.0.1:8000/api/auth/me/', {
                headers: {
                    'Authorization': `Bearer ${accessToken}`
                }
            })
            .then(r => r.json())
            .then(data => {
                document.getElementById('user-info').textContent += '\n\nUser from API:\n' + JSON.stringify(data, null, 2);
            })
            .catch(err => {
                document.getElementById('user-info').textContent += '\n\nError fetching user: ' + err;
            });
        }
    </script>
</body>
</html>
