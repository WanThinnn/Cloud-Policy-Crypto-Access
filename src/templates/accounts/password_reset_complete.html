{% extends "base.html" %}

{% block title %}Đổi mật khẩu thành công - Crypto Access{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-16rem)] flex items-center justify-center px-4">
    <div class="max-w-md w-full bg-white p-8 rounded-lg shadow-md text-center">
        <div class="mx-auto h-16 w-16 flex items-center justify-center rounded-full bg-green-100 mb-6">
            <svg class="h-10 w-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
        </div>
        
        <h2 class="text-2xl font-extrabold text-gray-900 mb-4">
            Đổi mật khẩu thành công!
        </h2>
        
        <p class="text-gray-600 mb-8">
            Mật khẩu của bạn đã được cập nhật. Bạn có thể sử dụng mật khẩu mới để đăng nhập ngay bây giờ.
        </p>
        
        <div>
            <a href="{% url 'login_page' %}" 
               class="w-full flex justify-center py-2.5 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150">
                Đăng nhập ngay
            </a>
        </div>
    </div>
</div>
{% endblock %}
