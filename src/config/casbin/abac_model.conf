# ABAC (Attribute-Based Access Control) Model for PyCasbin
# This model uses subject attributes, object (resource), and action for authorization

[request_definition]
# r = request: sub (subject with attributes), obj (resource), act (action)
r = sub, obj, act

[policy_definition]
# p = policy: sub_rule (condition expression), obj (resource), act (action), eft (effect)
p = sub_rule, obj, act, eft

[role_definition]
# g = role assignment (optional, for hybrid RBAC+ABAC)
g = _, _

[policy_effect]
# Allow if any matching policy allows, and none deny (deny-override)
e = some(where (p.eft == allow)) && !some(where (p.eft == deny))

[matchers]
# Match: evaluate subject rule against request subject attributes + match resource and action
# Support wildcard '*' for resource and action
m = eval(p.sub_rule) && (p.obj == '*' || r.obj == p.obj) && (p.act == '*' || r.act == p.act)
